---
name: GitHub Pages Deploy
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Queue Pages deployments; never cancel an in-flight deploy. Cancelling mid-
  # deploy leaves the Pages backend with a superseded deployment and the next
  # run fails with "Deployment failed, try again later" (see actions/deploy-pages).
  cancel-in-progress: false

jobs:
  docs:
    uses: f5-sales-demo/docs-control/.github/workflows/github-pages-deploy.yml@main
